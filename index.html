<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="js-file.js"></script>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <div class="main-container">
      <h1>Rock Paper Scissors</h1>

      <div class="score-board">
        <span class="human-score">Player: 0</span>
        <span class="computer-score">Computer: 0</span>
      </div>

      <p class="play-text">Choose your move!</p>

      <div class="player-selection">
        <button id="rock" class="play-btn active">✊</button>
        <button id="paper" class="play-btn active">✋</button>
        <button id="scissors" class="play-btn active">✌</button>
      </div>

      <div class="game-info">
        <p class="versus">You vs Computer</p>
        <p class="round-result">First to five wins</p>
      </div>
      <button class="play-again">Play Again</button>
    </div>
  </body>
</html>
