<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script defer src="js-file.js"></script>
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <div class="main-container">
      <h1>Rock Paper Scissors</h1>

      <div class="score-board">
        <span class="human-score">Player: 0</span>
        <span class="computer-score">Computer: 0</span>
      </div>

      <p>Choose your move!</p>

      <div class="player-selection">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissros">Scissors</button>
      </div>

      <div class="round-result">
        The computer chose "Y". You (won/lost) this round!
      </div>

      <!-- only display this button after a player reaches 5 points -->
      <button class="play-again">Play again</button>
    </div>
  </body>
</html>
